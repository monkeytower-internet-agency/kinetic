title: Perfect Fit
heading: "Unser <span class='text-brand'>3x3 PERFECT FIT</span> System"
content: "Einer der größten Gründe, warum Liegegurtzeuge manchmal „nicht passen“: Beine und Oberkörper sind nicht gleich proportioniert. Deshalb kommt KINETIC mit 3×3 Fit System: 3 Beinlängen × 3 Oberkörperlängen = 9 Kombinationen. So entsteht eine Passform, die sich nicht an Kompromissen orientiert, sondern an deinem Körper."
subheading: "weil Kontrolle bei der Passform beginnt."
button_text: "Beratung anfragen"
button_link: "/kontakt"

