slug: story-tired
type: text
title: Story Tired
heading: "Endlich keine Müdigkeit mehr im Körper."
content: "Ich bin nicht der Pilot, der nach 1 Stunde wieder landet. Ich liebe Strecke. Aber ich kenne dieses schleichende Ziehen im Oberschenkel, dieses Umsetzen, dieses „noch mal anders hinsetzen“. Und irgendwann wird aus Konzentration einfach nur noch Durchhalten. Beim ersten Flug mit KINETIC ist es mir erst nach der Landung aufgefallen: Ich war nicht kaputt. Kein Druck, keine Spannung, kein inneres Arbeiten.\n\nDieser ruhige Fokus, der sonst irgendwann weg ist. Das war der Moment, wo ich wusste: Das ist mein Gurtzeug."
subheading: "Der Unterschied zwischen Fliegen und Durchhalten."
