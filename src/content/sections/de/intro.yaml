type: text
title: Intro Section
heading: "Warum es im Sitz beginnt"
content: "Kennst du dieses Setup-Gefühl: einsteigen – abheben – alles stimmt? Dafür haben wir KINETIC gebaut. Komfort ist im Gleitschirmfliegen oft ein unterschätztes Thema. Viele denken: Komfort ist „nett“.\n\nAber wer lange fliegt, weiß: Komfort ist Konzentration. Wenn der Körper müde wird, wird der Kopf unruhig. Dann wird aus fliegen irgendwann „durchhalten“.\n\nKINETIC ist leicht, klar, präzise. Für Piloten, die Präzision lieben – und Ruhe suchen. Kontrolle beginnt viel früher. Sie beginnt dort, wo dein Körper sitzt. Wenn du im Sitz unruhig bist, wird dein Flug unruhig. Wenn dein Schwerpunkt wandert, wird dein Handling „laut“. Wenn du dich ständig neu organisieren musst, verlierst du Gefühl.\n\nKINETIC ist deshalb so gebaut, dass du im Schwerpunkt bleibst – ruhig, stabil, selbstverständlich. Nicht durch Spannung. Sondern durch Geometrie und Struktur."
subheading: "FLY FEWER CORRECTIONS. FEEL MORE."
