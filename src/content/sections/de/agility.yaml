title: Agility Control
heading: "AGILITY CONTROL™ (ABS im Flug einstellbar)"
content: "Ein Feature, das wir lieben, weil es so „pilotenlogisch“ ist: Du willst das System direkt und crisp? Stell es direkter. Es wird turbulent oder du willst mehr Ruhe? Stell es gedämpfter. Das ist keine Spielerei. Das ist genau die Freiheit, die du im echten Fliegerleben brauchst: Du passt dich der Luft an – ohne deinen Flow zu verlieren."
subheading: "Du bestimmst die Charakteristik — nicht die Bedingungen."
