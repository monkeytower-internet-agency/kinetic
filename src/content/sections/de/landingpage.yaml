slug: de/faq
type: faq
title: FAQ Section
heading: "Häufige Fragen (FAQ)"
items:
  - label: "Für wen ist KINETIC gemacht?"
    value: "Für Piloten, die Performance wollen, aber keinen Stress. Für lange Flüge, Thermik, anspruchsvolle Bedingungen und präzises Handling."
  - label: "Direkt vs. Gedämpft – wann stelle ich was ein?"
    value: "Mit AGILITY CONTROL kannst du im Flug zwischen direktem Feedback und gedämpfter Stabilität wählen — je nach Luft und Vorliebe."
  - label: "Warum ist Schwerpunkt so wichtig?"
    value: "Weil die beste Rückmeldung und die geringste Korrektur dort entstehen, wo Gewicht und Geometrie zusammenpassen."
  - label: "Wie finde ich die richtige Größe?"
    value: "Mit Beratung. KINETIC entfaltet PURE CONTROL erst dann vollständig, wenn Sitzposition, Rückenlänge und Setup passen."
