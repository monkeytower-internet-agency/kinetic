slug: de/intro
type: text
title: Intro Section
heading: "Warum es im Sitz beginnt"
content: "Viele glauben, Kontrolle entsteht über die Hände. Über Bremsen. Über Technik. Aber die Wahrheit ist: Kontrolle beginnt viel früher. Sie beginnt dort, wo dein Körper sitzt."
---
slug: de/story-tired
type: story
title: Kundenstory Fatigue
heading: "Endlich keine Müdigkeit mehr im Körper."
content: "Ich bin nicht der Pilot, der nach 1 Stunde wieder landet. Ich liebe Strecke. Aber ich kenne dieses schleichende Ziehen im Oberschenkel, dieses Umsetzen, dieses „noch mal anders hinsetzen“. Und irgendwann wird aus Konzentration einfach nur noch Durchhalten. Beim ersten Flug mit KINETIC ist es mir erst nach der Landung aufgefallen: Ich war nicht kaputt."
subheading: "Das war der Moment, wo ich wusste: Das ist mein Gurtzeug."
---
slug: de/cls-system
type: feature
title: CLS System
heading: "Wir nennen das CLS – CORE LOCK SYSTEM (TM)"
content: "CLS ist kein Feature. CLS ist das Sitzprinzip hinter KINETIC: Du sitzt stabil im Schwerpunkt – durch Geometrie und Lastpfade. Du sitzt richtig, ohne darüber nachzudenken. Oder nachzurutschen. Dein Gewicht ist dort, wo es wirken soll. Das ist der Moment, in dem PURE CONTROL entsteht."
subheading: "FLY FEWER CORRECTIONS. FEEL MORE."
---
slug: de/agility-control
type: feature
title: Agility Control
heading: "AGILITY CONTROL™ (ABS im Flug einstellbar)"
content: "Du willst das System direkt und crisp? Stell es direkter. Es wird turbulent oder du willst mehr Ruhe? Stell es gedämpfter. Das ist keine Spielerei. Das ist genau die Freiheit, die du im echten Fliegerleben brauchst."
subheading: "PURE CONTROL bedeutet: Du bestimmst die Charakteristik — nicht die Bedingungen."
---
