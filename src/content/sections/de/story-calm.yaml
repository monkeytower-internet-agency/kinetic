type: text
title: Story Calm
heading: "Der Tag, an dem es plötzlich ruhig wurde."
content: "Ich hatte einen dieser typischen Tage. 25 km/h oben, Thermik nicht sauber, überall kleine Schläge. Nicht schlimm, aber anstrengend. Früher war das der Moment, wo ich mich im Gurtzeug klein mache. Beine runter, Hände fest an die Tragegurte. Mit KINETIC war es anders. Ich habe das AGILITY CONTROL auf mittlere Dynamik gestellt – und plötzlich wurde es ruhig, präzise."
subheading: "Ich fliege wieder – statt nur durchzuhalten."
